  DishOutage:
    cause: Cause
    cause__hint: |
      The reason why the dish is offline. The possible options are:

      - **UNKNOWN**
      - **BOOTING** - Dish is trying to initialize a satellite connection.
        Should not hang in this state for too long. Most of the time, it is waiting for GPS.
      - **STOWED** - The dish is stowed to be packaged for storage.
      - **THERMAL_SHUTDOWN** - Dish is overheated. Waiting to cool down.
      - **NO_SCHEDULE**
      - **NO_SATS** - No enough GPS signal received.
      - **OBSTRUCTED** - Too many signal obstructions. Ensure the dish has a 140° view of the sky
        (at least in the part, where it is usually oriented).
      - **NO_DOWNLINK** - No downlink from satellites is established.
      - **NO_PINGS** - The dish is not receiving any pings from the network.
      - **ACTUATOR_ACTIVITY** - The dish actuators are moving (tilting or rotating).
      - **CABLE_TEST** - The dish is performing a cable diagnostics test.
      - **SLEEPING** - The dish is in power save (sleep) mode.
      - **SKY_SEARCH** - The dish is searching the sky for satellites.
    start_timestamp_ns: Start timestamp, ns
    duration_ns: Duration, ns
    did_switch: Did switch

  DishGpsStats:
    gps_valid: GPS valid
    gps_valid__hint: Whether the dish has acquired a valid GPS fix.
    gps_sats: GPS satellites
    gps_sats__hint: Number of GPS satellites currently visible to the dish.
    no_sats_after_ttff: No GPS satellites after a first fix
    no_sats_after_ttff__hint: Whether GPS satellite visibility was lost after Time To First Fix (TTFF). May indicate GPS antenna issues.
    inhibit_gps: Don't trust Dishy's GPS
    inhibit_gps__hint: Whether the dish's internal GPS is being ignored in favor of an alternative location source.

  DishReadyStates:
    cady: Clock generator
    scp: RFFE bus interface
    l1l2: Modem L1L2
    xphy: Xilinx XPHY interface
    aap: Digital beamformers
    rf: RF front end

  DishInitDuration:
    attitudeInitialization: Attitude initialization
    attitudeInitialization_hint: The terminal was able to understand its initial position (where is the top, where is the bottom, how it is tilted).
    burstDetected: Burst detected
    burstDetected_hint: The terminal heard the signal of the Starlink satellite.
    ekfConverged: EKF converged
    ekfConverged_hint: The terminal was able to understand its initial position (similar to Attitude initialization), but it is already stable, everything has converged and the terminal is already sure how it is turned.
    firstCplane: First CPlane
    firstCplane_hint: The terminal received the first control data packet from the satellite.
    firstPopPing: First PoP ping
    firstPopPing_hint: The terminal pinged the Point of Presence on the ground for the first time.
    gpsValid: GPS valid
    gpsValid_hint: GPS became a valid GPS and gave an accurate position.
    initialNetworkEntry: Initial network entry
    initialNetworkEntry_hint: The terminal has connected to the Starlink network for the first time and started communication.
    networkSchedule: Network schedule
    networkSchedule_hint: The terminal has received the first data packet with the cell schedule.
    rfReady: RF ready
    rfReady_hint: The terminal has completed antenna initialization without errors in XPHY, RF, SCP, etc.
    stableConnection: Stable connection
    stableConnection_hint: The terminal has received a stable connection to the network.

  DishConfig:
    snow_melt_mode: Snow melt mode
    snow_melt_mode__hint: |
      The possible options are:

      - **AUTO** - The dish automatically melts snow when detected.
      - **ALWAYS_ON** - Snow melting heater is always on.
      - **ALWAYS_OFF** - Snow melting heater is always off.
    location_request_mode: Location request mode
    location_request_mode__hint: |
      The possible options are:
      - **NONE** - Starlink does not expose its location to the local network.
      - **LOCAL** - Starlink exposes its location to the local network via DHCP and dish API.
      
      In order to change this setting, you need the original Starlink app with a logged-in account 
      with internet access and dish access. You can find this setting in 
      *Advanced* -> *Debug Data* -> *Allow access on local network*.

    level_dish_mode: Level dish mode
    level_dish_mode__hint: |
      The possible options are:

      - **TILT_LIKE_NORMAL** - The dish tilts normally to track satellites.
      - **FORCE_LEVEL** - The dish is forced to stay level (horizontal).
    power_save_start_minutes: Power save start minutes
    power_save_duration_minutes: Power save duration minutes
    power_save_mode: Power save mode
    power_save_mode__hint: |-
      You can set a sleep mode for your Starlink. Starlink won't provide Internet or melt snow while sleeping.

  DishObstructionStats:
    fraction_obstructed: Fraction obstructed
    fraction_obstructed__hint: Percentage of the sky obstructed from the dish's view. Lower is better.
    valid_s: Time valid
    valid_s__hint: Duration for which obstruction data has been collected and is considered valid.
    currently_obstructed: Currently obstructed
    currently_obstructed__hint: Whether the dish signal is currently blocked by an obstruction.
    avg_prolonged_obstruction_duration_s: "Average prolonged obstruction duration"
    avg_prolonged_obstruction_duration_s__hint: Average duration of prolonged signal obstructions.
    avg_prolonged_obstruction_interval_s: "Average prolonged obstruction interval"
    avg_prolonged_obstruction_interval_s__hint: Average time between prolonged obstructions.
    avg_prolonged_obstruction_valid: Average prolonged obstruction valid
    avg_prolonged_obstruction_valid__hint: Whether enough data has been collected for prolonged obstruction statistics to be reliable.
    time_obstructed: Time obstructed
    time_obstructed__hint: Total fraction of time the dish signal has been obstructed.
    patches_valid: Patches valid
    patches_valid__hint: Whether the obstruction map patches contain valid data.

  DishGetStatus:
    uptime_s: Uptime
    uptime_s__hint: Time the dish has been running since the last reboot.
    seconds_to_first_nonempty_slot: Seconds to first non-empty slot
    seconds_to_first_nonempty_slot__hint: Time until the dish has its next scheduled communication slot with a satellite.
    fraction_obstructed: fraction_obstructed
    valid_s: valid_s
    currently_obstructed: currently_obstructed
    avg_prolonged_obstruction_duration_s: avg_prolonged_obstruction_duration_s
    avg_prolonged_obstruction_interval_s: avg_prolonged_obstruction_interval_s
    avg_prolonged_obstruction_valid: avg_prolonged_obstruction_valid
    time_obstructed: time_obstructed
    patches_valid: patches_valid
    dlBandwidthRestrictedReason: Bandwidth restriction (download)
    ulBandwidthRestrictedReason: Bandwidth restriction (upload)

    downlink_throughput_bps: Downlink Throughput
    uplink_throughput_bps: Uplink Throughput
    pop_ping_drop_rate: PoP ping drop rate
    pop_ping_latency_ms: PoP ping latency
    pop_ping__hint: |
      The Starlink network comprises the following components:
      - User Terminals (UT)
      - Satellites (SAT)
      - Ground Stations (which physically connect with satellites)
      - Points of Presence (PoP) (connecting with ground stations via fiber, and routing network traffic to the Internet)
      
      **PoP Ping Latency** refers to the time taken for a packet to be transmitted from the User Terminal to a Point of Presence and back.
      
      **PoP Ping Drop Rate** indicates the fraction of packets lost during transmission between the User Terminal and a Point of Presence.

    stow_requested: Stow requested
    stow_requested__hint: Whether a stow command has been sent. When stowed, the dish folds flat for storage or transport.
    boresight_azimuth_deg: Panel boresight Azimuth angle, deg
    boresight_azimuth_deg__hint: The horizontal compass direction the dish antenna panel is currently pointing, in degrees.
    boresight_elevation_deg: Panel boresight Elevation angle, deg
    boresight_elevation_deg__hint: The vertical angle the dish antenna panel is currently pointing above the horizon, in degrees.

    eth_speed_mbps: Ethernet speed, Mbps
    mobility_class: Mobility class
    mobility_class__hint: |
      The possible options are:

      - **STATIONARY** - The dish is installed at a fixed location (residential use).
      - **NOMADIC** - The dish can be moved between locations but is not used while in motion.
      - **MOBILE** - The dish is used while in motion (boats, RVs, etc.).
    is_snr_above_noise_floor: SNR above the noise floor
    is_snr_above_noise_floor__hint: Whether the Signal-to-Noise Ratio is above the minimum threshold required for reliable communication.

    class_of_service: Class of service
    class_of_service__hint: |
      The possible options are:

      - **UNKNOWN**
      - **CONSUMER** - Residential Starlink plan.
      - **BUSINESS** - Starlink Business plan.
      - **BUSINESS_PLUS** - Starlink Business Plus plan with higher priority.
      - **COMMERCIAL_AVIATION** - Starlink Aviation plan for commercial aircraft.
    software_update_state: Software update state
    software_update_state__hint: |
      The possible options are:

      - **UNKNOWN**
      - **IDLE** - No software update is in progress.
      - **FETCHING** - Downloading a new software update.
      - **PRE_CHECK** - Running pre-update checks.
      - **WRITING** - Writing the update to the partition.
      - **POST_CHECK** - Running post-update verification.
      - **REBOOT_REQUIRED** - Update is ready, reboot is needed to apply.
      - **DISABLED** - Software updates are disabled.
      - **FAULTED** - Software update process has faulted.
    is_snr_persistently_low: SNR persistently low
    is_snr_persistently_low__hint: Whether the Signal-to-Noise Ratio has been consistently below acceptable levels. May indicate obstructions or hardware issues.
    has_actuators: Actuators
    has_actuators__hint: Whether the dish has motorized actuators for tilting and rotating.
    actuator_state: Actuators state
    actuator_state__hint: |
      The possible options are:

      - **IDLE** - Actuators are idle, dish is in normal operating position.
      - **FULL_TILT** - Dish is fully tilted.
      - **ROTATE** - Dish is rotating.
      - **TILT** - Dish is tilting.
      - **UNWRAP_POSITIVE** - Dish is unwrapping cables in positive direction.
      - **UNWRAP_NEGATIVE** - Dish is unwrapping cables in negative direction.
      - **TILT_TO_STOWED** - Dish is tilting to stowed (flat) position.
      - **FAULTED** - Actuator has faulted and needs attention.
      - **WAIT_TIL_STATIC** - Waiting until the dish is static before moving.
      - **DRIVE_TO_MOBILE_POSITION** - Driving to mobile operating position.
      - **MOBILE_WAIT** - Waiting in mobile mode.
    disablement_code: Service state
    disablement_code__hint: |
      The possible options are:

      - **UNKNOWN_STATE**
      - **OKAY** - Service is operating normally.
      - **NO_ACTIVE_ACCOUNT** - No active Starlink account is associated with this dish.
      - **TOO_FAR_FROM_SERVICE_ADDRESS** - The dish is too far from the registered service address.
      - **IN_OCEAN** - The dish location is detected as being in the ocean.
      - **BLOCKED_COUNTRY** - Starlink service is not available in this country.
      - **DATA_OVERAGE_SANDBOX_POLICY** - Data cap exceeded under sandbox policy.
      - **CELL_IS_DISABLED** - The Starlink cell serving this area is disabled.
      - **ROAM_RESTRICTED** - Roaming is restricted for this plan or location.
      - **UNKNOWN_LOCATION** - The dish cannot determine its location.
      - **ACCOUNT_DISABLED** - The Starlink account has been disabled.
      - **UNSUPPORTED_VERSION** - The dish software version is no longer supported.
      - **MOVING_TOO_FAST_FOR_POLICY** - The dish is moving faster than allowed by the service plan.
      - **UNDER_AVIATION_FLYOVER_LIMITS** - Under aviation flyover altitude limits.
      - **BLOCKED_AREA** - The dish is in a restricted or blocked area.
    reboot_reason: Reboot reason
    reboot_reason__hint: |
      The possible options are:

      - **NONE**
      - **MANUAL** - Reboot was triggered manually by the user.
      - **LOSS_OF_COMM** - Reboot due to loss of communication with the network.
      - **SWUPDATE_NOW** - Immediate software update reboot.
      - **SWUPDATE_SCHEDULED** - Scheduled software update reboot.
      - **APP** - Reboot requested by the Starlink app.
      - **EMC** - Reboot triggered by EMC (electromagnetic compatibility) subsystem.
      - **FACTORY_RESET** - Reboot after factory reset.
      - **TEST_CASE** - Reboot triggered by a test case.
      - **THERMAL_POWER_CUT** - Reboot due to thermal power cut protection.
      - **CRITICAL_PROCESS_DIED** - A critical process crashed, forcing a reboot.
      - **NO_RF_READY** - RF front end failed to initialize.
      - **POSTPONED_LOSS_OF_COMM** - Postponed reboot after loss of communication.
      - **SWUPDATE_STATIONARY** - Software update reboot while stationary.
      - **AAP_CRASH** - Digital beamformer (AAP) crash.
      - **XP70_SACS** - XP70 SACS subsystem failure.
      - **INE_FAILED** - Initial network entry failed.
      - **KERNEL_TAINTED** - The kernel was tainted (e.g. by a module error).
  AlignmentStats:
    has_actuators: has_actuators
    actuator_state: actuator_state
    tilt_angle_deg: tilt_angle_deg
    boresight_azimuth_deg: Panel boresight Azimuth angle, deg
    boresight_elevation_deg: Panel boresight Elevation angle, deg
    attitude_estimation_state: Attitude estimation state
    attitude_estimation_state__hint: |
      The possible options are:

      - **FILTER_RESET** - Attitude filter has been reset, not yet estimating.
      - **FILTER_UNCONVERGED** - Attitude filter is running but has not yet converged.
      - **FILTER_CONVERGED** - Attitude filter has converged, position estimation is stable.
      - **FILTER_FAULTED** - Attitude filter has faulted.
      - **FILTER_INVALID** - Attitude filter state is invalid.
    attitude_uncertainty_deg: Attitude uncertainty, deg
    desired_boresight_azimuth_deg: Desired boresight Azimuth angle, deg
    desired_boresight_azimuth_deg__hint: The target horizontal direction the dish should point to for optimal satellite communication, in degrees.
    desired_boresight_elevation_deg: Desired boresight Elevation angle, deg
    desired_boresight_elevation_deg__hint: The target vertical angle the dish should point to for optimal satellite communication, in degrees.

