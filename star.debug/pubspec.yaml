name: star_debug
description: Starlink debug information parser
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.41+41

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  shared_preferences: any
  logger: ^2.6.2
  path_provider: any
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.40
  i18n: any
  devicelocale: ^0.8.2
  permission_handler: ^12.0.1
  device_info_plus: ^12.1.0
  connectivity_plus: ^7.0.0
  json_annotation: ^4.9.0
  package_info_plus: ^9.0.0
  intl: any
  firebase_core: ^4.1.1
  firebase_crashlytics: any
  firebase_analytics: any
  clipboard: ^2.0.2
  time_machine: 0.9.17
  flutter_timezone: ^5.0.0
  upgrader: ^12.1.0
  file_picker: any
  flex_list: ^1.2.0
  grpc: ^4.1.0
  protobuf: any
  fixnum: any
  dio: ^5.9.0
  syncfusion_flutter_charts: ^31.1.23
  recase: 4.1.0
  share_plus: ^12.0.0
  mutex: ^3.1.0
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2
  flutter_email_sender: ^8.0.0
  convert: ^3.1.2
  screenshot: 3.0.0
  image: ^4.5.4
  google_fonts: any
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.1
  build_runner: any
  flutter_launcher_icons: any
  drift_dev: ^2.28.3

  # The lint set provided by the package is activated in the `analysis_options.yaml`
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path_ios: "_misc/logo.png"
  image_path_android: "_misc/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "_misc/logo.png"

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - packages/time_machine/data/cultures/cultures.bin
    - packages/time_machine/data/tzdb/tzdb.bin
    - assets/images/
    - assets/images/devices/
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
