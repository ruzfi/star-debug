syntax = "proto3";

package SpaceX.API.Device.Gnss;

//SpaceX.API.Device.Gnss.Measurement is a message:
message Measurement {
  int64 time_of_validity_ns = 1;
  .SpaceX.API.Device.Gnss.SatelliteSystem satellite_system = 2;
  int32 prn = 3;
  .SpaceX.API.Device.Gnss.Pseudorange pseudorange = 4;
  .SpaceX.API.Device.Gnss.Ephemeris ephemeris = 5;
}

//SpaceX.API.Device.Gnss.SatelliteSystem is an enum:
enum SatelliteSystem {
  SYS_GPS = 0;
  SYS_GALILEO = 1;
  SYS_GLONASS = 2;
  SYS_BEIDOU = 3;
  SYS_SBAS = 4;
  SYS_QZSS = 5;
  SYS_IRNSS = 6;
  SYS_STARLINK = 7;
  SYS_STARSHIELD = 8;
}

//SpaceX.API.Device.Gnss.Pseudorange is a message:
message Pseudorange {
  double pseudorange_m = 1;
  float pseudorange_variance_m2 = 2;
}

//SpaceX.API.Device.Gnss.Ephemeris is a message:
message Ephemeris {
  .SpaceX.API.Device.Gnss.SatnavTime sv_data_time = 1;
  .SpaceX.API.Device.Gnss.CoordinateFrame coordinate_frame = 2;
  .SpaceX.API.Device.Gnss.Vector3 sv_pos_m = 3;
  .SpaceX.API.Device.Gnss.Vector3 sv_vel_m = 4;
}

//SpaceX.API.Device.Gnss.SatnavTime is a message:
message SatnavTime {
  uint32 week_number = 1;
  double seconds_of_week = 2;
  .SpaceX.API.Device.Gnss.TimeReference time_reference = 3;
}

//SpaceX.API.Device.Gnss.TimeReference is an enum:
enum TimeReference {
  TIME_GPS = 0;
  TIME_GALILEO = 1;
  TIME_BEIDOU = 2;
  TIME_GLONASS = 3;
}

//SpaceX.API.Device.Gnss.CoordinateFrame is an enum:
enum CoordinateFrame {
  ITRF = 0;
  ECEF = 1;
  GTRF = 2;
  PZ90 = 3;
}

//SpaceX.API.Device.Gnss.Vector3 is a message:
message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}
